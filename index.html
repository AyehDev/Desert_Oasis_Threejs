<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Desert Oasis – Crash Site</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui">WASD – move | mouse – look | click to lock</div>

    <div id="crosshair">+</div>

    <script async src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/PointerLockControls.js"></script>

    <!-- Scene logic -->
    <script src="main.js"></script>
  </body>
</html>
